<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-right">
        <a href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox">Gmail</a>
        <a href="https://www.google.com/imghp?hl=fr&tab=ri&authuser=0&ogbl">Images</a>
        <div class="profile"></div>
    </div>
</header>

<div class="main">
    <h1 class="logo">Google</h1>

    <div class="search-container">
        <span class="icon">🔍</span>
        <input type="text" placeholder="Rechercher sur Google ou saisir une URL">
        <span class="icon">🎤</span>
        <span class="mode">Mode IA</span>
    </div>

    <div class="shortcuts">
        <div class="shortcut">
            <div class="circle">▶</div>
            <a href="https://www.youtube.com/">
            <p>YouTube</p>
        </div>

        <div class="shortcut">
            <div class="circle">+</div>
            <p>Ajouter un raccourci</p>
        </div>
    </div>
</div>

</body>
</html>
